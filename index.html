<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Stream Banner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
}

.banner {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(270deg, #ff00cc, #00fff0, #ffcc00);
  background-size: 600% 600%;
  animation: moveBG 6s ease infinite;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 28px;
  font-weight: bold;
  color: white;
  font-family: Arial;
  text-shadow: 0 0 10px black;
}

@keyframes moveBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}
</style>
</head>

<body>

<div class="banner">
  🔴 LIVE  @YOURNAME  |  FOLLOW FOR MORE
</div>

</body>
</html>
