<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Soft Smoke Overlay</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
}

/* 背景：非常淡的灰白 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    135deg,
    rgba(245,245,245,0.55),
    rgba(255,255,255,0.25)
  );
}

/* 烟雾层 */
.smoke {
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;

  background: radial-gradient(circle at 70% 40%,
    rgba(180,180,180,0.25),
    rgba(255,255,255,0) 60%
  );

  filter: blur(40px);
  opacity: 0.6;

  animation: drift 18s linear infinite;
}

/* 第二层烟雾（增强自然感） */
.smoke2 {
  position: absolute;
  width: 180%;
  height: 180%;
  top: -40%;
  left: -40%;

  background: radial-gradient(circle at 80% 30%,
    rgba(200,200,200,0.18),
    rgba(255,255,255,0) 65%
  );

  filter: blur(60px);
  opacity: 0.5;

  animation: drift2 25s linear infinite;
}

/* 从右 → 左下飘 */
@keyframes drift {
  0% {
    transform: translate(20%, -10%) scale(1);
  }
  50% {
    transform: translate(-10%, 10%) scale(1.1);
  }
  100% {
    transform: translate(-30%, 25%) scale(1);
  }
}

/* 更慢一层 */
@keyframes drift2 {
  0% {
    transform: translate(30%, 0%) scale(1);
  }
  50% {
    transform: translate(0%, 15%) scale(1.05);
  }
  100% {
    transform: translate(-20%, 30%) scale(1);
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="smoke"></div>
<div class="smoke2"></div>

</body>
</html>
